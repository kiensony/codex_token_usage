name: Build Linux Binary

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-binary:
    name: Linux x86_64 standalone binary
    runs-on: ubuntu-22.04
    env:
      LINUX_BUILD_IMAGE: python:3.12-bullseye
      LINUX_BUILD_PYTHON: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build standalone executable on glibc 2.31 baseline
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e PYTHON_BIN="${LINUX_BUILD_PYTHON}" \
            -e PIP_INSTALL_ARGS=--user \
            -e RUNNER_TEMP=/tmp \
            -v "$PWD:/io" \
            -w /io \
            "${LINUX_BUILD_IMAGE}" \
            /bin/bash packaging/build-linux-binary.sh
          cat dist/linux-binary.env >> "$GITHUB_ENV"

      - name: Verify bundled executable on runner
        run: |
          ./dist/codex-token-usage --help
          ./dist/codex-token-usage --format json --codex-home "$RUNNER_TEMP/missing-codex-home"

      - name: Upload installable archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: |
            dist/${{ env.PACKAGE_NAME }}.tar.gz
            dist/${{ env.PACKAGE_NAME }}.sha256

      - name: Upload raw executable
        uses: actions/upload-artifact@v4
        with:
          name: codex-token-usage-linux-x86_64
          path: dist/codex-token-usage

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "dist/${PACKAGE_NAME}.tar.gz" \
              "dist/${PACKAGE_NAME}.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "dist/${PACKAGE_NAME}.tar.gz" \
              "dist/${PACKAGE_NAME}.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
